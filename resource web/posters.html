<!-- Isotope filter -->
    <div class="film-filters">
        <button class="is-checked" data-filter="*">Show all</button>

        <div class="filter-group">
            <button type="button" class="filter-parent">Genre</button>
            <div class="filter-submenu">
                <button data-filter=".genre-action-adventure">Action/Adventure</button>
                <button data-filter=".genre-scifi-fantasy">Sci-Fi/Fantasy</button>
                <button data-filter=".genre-comedy">Comedy</button>
                <button data-filter=".genre-romance">Romance</button>
                <button data-filter=".genre-animation">Animation</button>
                <button data-filter=".genre-crime-drama-thriller-mystery">Crime/Drama/Thriller/Mystery</button>
                <button data-filter=".genre-horror">Horror</button>
            </div>
        </div>

        <div class="filter-group">
            <button type="button" class="filter-parent">Decade</button>
            <div class="filter-submenu">
                <button data-filter=".decade-1950s">1950s</button>
                <button data-filter=".decade-1960s">1960s</button>
                <button data-filter=".decade-1970s">1970s</button>
                <button data-filter=".decade-1980s">1980s</button>
                <button data-filter=".decade-1990s">1990s</button>
                <button data-filter=".decade-2000s">2000s</button>
                <button data-filter=".decade-2010s">2010s</button>
                <button data-filter=".decade-2020s">2020s</button>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="grid-item amelie genre-romance genre-comedy decade-2000s">
            <img src="images/OGs/amelie-og.jpg" alt="Amelie French poster">
        </div>
        <div class="grid-item venom genre-action-adventure decade-2010s">
            <img src="images/OGs/venom-us.jpg" alt="Venom US poster">

            <img src="images/OGs/apacolypse now us.jpg" alt="Apocalypse Now US poster">
        </div>
        <div class="grid-item black-panther genre-action-adventure genre-scifi-fantasy decade-2010s">
            <img src="images/OGs/black panther OG.jpg" alt="Black Panther US poster">
        </div>
        <div class="grid-item carrie genre-horror decade-1970s">
            <img src="images/OGs/carrie us.jpg" alt="Carrie US poster">
        </div>
        <div class="grid-item cleo genre-romance genre-comedy decade-1960s">
            <img src="images/OGs/cleo french.jpg" alt="Cleo French poster">
        </div>
        <div class="grid-item doctor-strange genre-action-adventure genre-scifi-fantasy decade-2020s">
            <img src="images/OGs/doctor-strange-us.jpg" alt="Doctor Strange US poster">
        </div>
        <div class="grid-item et genre-scifi-fantasy genre-action-adventuredecade-1980s">
            <img src="images/OGs/ET us.jpg" alt="E.T. US poster">
        </div>
        <div class="grid-item fatal-attraction genre-crime-drama-thriller-mystery decade-1980s">
            <img src="images/OGs/fatal attraction og.jpg" alt="Fatal Attraction US poster">

        <div class="grid-item force-awakens genre-scifi-fantasy genre-action-adventure decade-2010s">

        </div>
        <div class="grid-item jaws genre-horror genre-action-adventuredecade-1970s">
