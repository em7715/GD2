    <div class="film-filters">
        <button class="is-checked" data-filter="*">Show all</button>

        <div class="filter-group">
            <button type="button" class="filter-parent">Country of origin</button>
            <div class="filter-submenu">
                <button data-filter=".origin-us">United States</button>
                <button data-filter=".origin-france">France</button>
                <button data-filter=".origin-germany">Germany</button>
                <button data-filter=".origin-japan">Japan</button>

        </div>

        <div class="filter-group">
            <button type="button" class="filter-parent">Genre</button>

        <div class="filter-group">
