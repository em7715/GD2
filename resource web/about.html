    <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div class="container">

             <div class="navbar">
                <a href="home.html">Home</a>

                <a href="discover.html">Discover</a>

                <button id="accessibility-btn" class="accessibility-btn" aria-label="Open accessibility menu" title="Accessibility Settings">Accessibility</button>
            </div>
            
            <div id="accessibility-menu" class="accessibility-menu">
              <button class="close-accessibility-menu" aria-label="Close accessibility menu">×</button>
              <h2>Accessibility</h2>
              
              <div class="accessibility-setting">
                <label for="font-size-slider">Font Size: <span id="font-size-value">100%</span></label>
                <input type="range" id="font-size-slider" min="75" max="200" value="100">
              </div>
              
              <div class="accessibility-setting">
                <button id="text-spacing-toggle">Increase Text Spacing</button>
              </div>
              
              <div class="accessibility-setting">
                <button id="dark-mode-toggle">Dark Mode</button>
              </div>
              
              <div class="accessibility-setting">
                <button id="high-contrast-toggle">High Contrast</button>
              </div>
              
              <div class="accessibility-setting">
                <button id="text-to-speech-toggle">🔊 Text-to-Speech</button>
              </div>
              
              <div class="accessibility-setting">
                <button id="reset-accessibility">Reset All</button>
              </div>
            </div>
            
            <main id="main-content">

        
           
        </div>

    <script src="accessibility.js"></script>
    </body>
