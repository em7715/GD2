<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FILM FOR ALL</title>
        <link rel="stylesheet" href="global.css"/>
        <link rel="stylesheet" href="https://unpkg.com/flickity@2/dist/flickity.min.css"/>
        <link rel="stylesheet" href="postervariations.css"/>
        <link rel="stylesheet" href="postersCSS.css"/>
    </head>
    <body>
    <div class="container">
            <a href="home.html"><div class="header"> <h1>FILM FOR ALL</h1> </div></a>
        <div class="navbar">
            <a href="home.html">Home</a>
            <a class="active" href="posters.html">Posters</a>
            <a href="discover.html">Discover</a>
        </div>

<div class="row album-thumbs">
    <div class="column carousel-cell">
        <img src="images/OGs/doctor-strange-us.jpg" alt="Doctor Strange US poster" data-sidebar-title="Original (US)" data-sidebar-text="The original US poster." style="width:100%">
    </div>
    <div class="column carousel-cell">
        <img src="images/Variants/doctor-strange-italy.jpg" alt="Doctor Strange Italian poster" data-sidebar-title="Italy" data-sidebar-text="The Italian variant, though largely identical, had to change Strange’s hand gestures to avoid 
being offensive. In Italy, the original gesture referred to 
the person receiving 
said gesture as a cuckold, thus for cultural reasons had 
to be changed.." style="width:100%">
    </div>
</div>

        <div class="movie-title">Doctor Strange (2022)</div>

        <aside id="posterSidebar" class="poster-sidebar" aria-live="polite">
            <h2 id="posterSidebarTitle">Poster details</h2>
            <p id="posterSidebarText">Hover over a poster to see notes here.</p>
        </aside>

        <div class="site-footer"><p>Designed by Emma Burke</p></div>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://unpkg.com/flickity@2/dist/flickity.pkgd.min.js"></script>
        <script>
            $(function () {
                var $carousel = $('.album-thumbs');
                if ($carousel.find('.carousel-cell').length === 2) {
                    $carousel.append($carousel.find('.carousel-cell').slice(0, 2).clone());
                }
                $carousel.flickity({ wrapAround: true, pageDots: false });
                var $sidebar = $('#posterSidebar');
                var $sidebarTitle = $('#posterSidebarTitle');
                var $sidebarText = $('#posterSidebarText');
                $('.album-thumbs img').on('mouseenter', function () {
                    $sidebarTitle.text($(this).attr('data-sidebar-title') || 'Poster details');
                    $sidebarText.text($(this).attr('data-sidebar-text') || '');
                    $sidebar.addClass('is-visible');
                });
                $('.album-thumbs').on('mouseleave', function () { $sidebar.removeClass('is-visible'); });
                $('.flickity-button').on('mouseenter', function () { $sidebar.removeClass('is-visible'); });
            });
        </script>
    </body>
</html>
